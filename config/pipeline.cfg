[data]
data_root = data/processed/Datos-post-COUTA
base_path_glob = data/processed/Datos-post-COUTA/*/
key_word = NO2
file_extension = csv
freq = h
timestamp_column = fecha
target_column_index = 0
min_non_nan_ratio = 0.15
min_series_points = 600

[anomaly]
# unlabeled: cribado sin etiquetas por tasa de deteccion (igual que produccion).
# synthetic: inyeccion de anomalias sobre la serie real (sin base STL) + VUS-PR.
mode = unlabeled
pollutant = NO2
raw_base_dir = data/raw/datos_estaciones_5m
models = all
ensemble_method = AVG
device = cpu
seed = 13
# [unlabeled] Binarizacion de scores: umbral = mediana + threshold_k * 1.4826 * MAD.
threshold_k = 3.5
# [unlabeled] Se descartan los detectores cuya tasa media de deteccion supere este
# limite (los errores de sensor son raros; superarlo = marcar variacion normal).
max_detection_rate = 0.07
# [synthetic] Semilla de la inyeccion de evaluacion (held-out; distinta de seed).
eval_seed = 101
# [synthetic] Tamano del ensemble (top-k por VUS-PR de la inyeccion de seleccion).
ensemble_top_k = 3
min_series_points = 600

[benchmark]
size_k = 5
model_names = TiDE,NHiTS,TCN,TSMixer,RNN,NLinear,DLinear
tspulse_model_path =
gap_sizes = 1,2,5,10
num_gaps = 3
gap_strategy = hybrid_tspulse
metrics = mae,rmse,mase
random_seed = 42
seasonality_m = 24
val_size = 48
val_context_len = 72
min_train_len_base = 72

[forecasting]
detectors = all
seed = 13
device = cpu
threshold_k = 3.5
max_detection_rate = 0.07
imputation_model = interp
forecast_models = NLinear,TiDE
holdout = 168
context_len = 72
min_series_points = 600

[tspulse]
id_column = series_id
tspulse_target_column = value
model_id = ibm-granite/granite-timeseries-tspulse-r1
revision = tspulse-hybrid-dualhead-512-p8-r1
context_length = 512
mask_type = var_hybrid
mask_ratio = 0.7
epochs = 100
batch_size = 16
eval_batch_size = 16
valid_fraction = 0.2
learning_rate = 1e-4
weight_decay = 1e-2
plateau_mode = min
plateau_factor = 0.5
plateau_patience = 3
plateau_threshold = 1e-4
plateau_threshold_mode = rel
plateau_cooldown = 0
plateau_min_lr = 1e-6
plateau_eps = 1e-8
early_stopping_patience = 5
early_stopping_threshold = 0.0
num_workers = 4
seed = 42
device = cpu
report_to = none
output_dir = models/tspulse_finetune

[training]
batch_size = 256
n_epochs = 3
learning_rate = 1e-3
weight_decay = 1e-2
lr_scheduler_factor = 0.5
lr_scheduler_patience = 2
random_state = 42
early_stopping_patience = 5
early_stopping_min_delta = 1e-4

[models]
tide_input_chunk_length = 72
tide_hidden_size = 512
nhits_input_chunk_length = 72
nhits_layer_widths = 512
nlinear_input_chunk_length = 72
dlinear_input_chunk_length = 72
tcn_input_chunk_length = 72
tcn_num_filters = 16
transformer_input_chunk_length = 72
tsmixer_input_chunk_length = 72
tsmixer_hidden_size = 128
tsmixer_ff_size = 128
rnn_input_chunk_length = 48
rnn_training_length = 72
rnn_hidden_dim = 64
linear_regression_lags = 72
